# ~/.config/pr-bot/config.toml

bot_username = "my-coder-bot"
authorized_user = "your-real-username"

# Paths (defaults shown)
# workflows_dir = "~/.config/pr-bot/workflows"
# cache_dir = "~/.cache/pr-bot"
# state_file = "~/.config/pr-bot/state.json"

# max_concurrent = 3
# poll_interval_secs = 300
# health_check_interval_secs = 60
# health_check_grace_period_secs = 1209600 # 14 days
# task_timeout_secs = 1800
# model = "anthropic/claude-sonnet-4"

# Poll the GitHub search API for @mentions on any repo the bot
# account can read (no per-repo collaborator setup required).
# poll_mentions = true

# ── Attribution ──
# Signature appended to bot comments and commit messages so readers
# know the content is LLM-generated. {author} resolves to authorized_user.
#
# Disable with: enabled = false
# Customize the full text:
#   text = "---\n*Authored by @{author}. Powered by [PR bot](https://github.com/johnsaigle/pr-bot)*"
[attribution]
enabled = true
